schema: apteva-app/v1

name: messaging
display_name: Messaging
version: 0.11.5
description: |
  Send and receive messages across channels. v0.1 ships email via
  AWS SES; SMS and push are reserved channel namespaces. Tracks
  delivery state, maintains a per-channel suppression list from
  bounces and complaints, and routes inbound mail to other apps'
  HTTP routes via a small pattern table.

  The shape is channel-agnostic: addresses are URIs (mailto:, tel:,
  apteva://contact/N) and a single `send_message` tool dispatches
  on the URI scheme. Per-channel fields (subject, body_html for
  email) are optional and ignored when the resolved channel is not
  email.

author: Apteva
homepage: https://github.com/apteva/apps/tree/main/mcp/messaging
icon: https://raw.githubusercontent.com/apteva/apps/main/mcp/messaging/icon.png
tags: [messaging, email, ses, inbox]

scopes: [project, global]
min_apteva_version: "0.10.0"

requires:
  permissions:
    - db.write.app
    - net.egress
    - platform.connections.execute
    - platform.apps.call
  integrations:
    - role: email_provider
      kind: integration
      compatible_slugs: [aws-ses]
      capabilities: [email.send]
      tools:
        email.send: send_email
      required: true
      label: "Email provider (AWS SES)"
      hint: "Verifies the sender domain and delivers outbound mail. Bounce/complaint webhook target lives in app config."
    - role: phone_provider
      kind: integration
      compatible_slugs: [twilio]
      capabilities: [sms.send, whatsapp.send]
      tools:
        sms.send: send_sms
        whatsapp.send: send_whatsapp
      required: false
      label: "Phone provider (SMS + WhatsApp via Twilio)"
      hint: "Required for channel=sms or channel=whatsapp sends. Without this binding, send_message returns a clear error on phone channels."
    - role: storage
      kind: app
      compatible_app_names: [storage]
      capabilities: [files.write]
      required: false
      label: "Storage (optional)"
      hint: "Persists outbound attachments and parsed inbound parts. Without this, attachments on outbound must be base64-inline and inbound attachments are dropped."
    - role: domains
      kind: app
      compatible_app_names: [domains]
      capabilities: [dns.upsert_record]
      required: false
      label: "Domains (optional)"
      hint: "When bound, /senders/setup-domain auto-publishes DKIM CNAMEs + MX + SPF records via the domains app. Without it, the setup endpoint returns the records as JSON for manual paste into the registrar."
    - role: inbound_storage
      kind: integration
      compatible_slugs: [aws-s3]
      capabilities: [files.read, files.write]
      tools:
        files.read: get_object
        files.write: put_object
      required: false
      label: "Inbound storage (AWS S3)"
      hint: "Bucket where SES drops inbound .eml files. Required for /senders/bootstrap-inbound and for fetching attachments / large messages from SES inbound notifications."
    - role: inbound_notifications
      kind: integration
      compatible_slugs: [aws-sns]
      capabilities: [topic.manage, topic.subscribe]
      tools:
        topic.manage: set_topic_attributes
        topic.subscribe: subscribe
      required: false
      label: "Inbound notifications (AWS SNS)"
      hint: "Topic SES publishes inbound notifications to. Required for /senders/bootstrap-inbound — without it, inbound setup is manual via the AWS console."

provides:
  http_routes:
    - prefix: /
  mcp_tools:
    # outbound
    - { name: send_message,           description: "Send a message. Args: to (URI or URI[]), body, subject?, body_html?, from?, reply_to?, headers?, attachment_storage_ids?, template_id?, vars?, prefer_channel?, idempotency_key?. URI scheme picks the channel (mailto:, tel:, apteva://contact/N). Bare email strings are coerced to mailto:." }
    - { name: send_message_template,  description: "Render a saved template + send. Args: template_id, to, vars?, attachment_storage_ids?, idempotency_key?. Convenience over send_message with template_id." }
    - { name: message_get,            description: "Fetch one message by id — headers, status, channel, direction, delivery events." }
    - { name: message_list,           description: "List messages. Filters: direction? (in|out), channel?, status?, since?, address? (canonical URI), limit?." }
    - { name: inbound_redispatch,     description: "Re-attempt routing for an inbound message that previously failed or had no_match. Args: id." }
    # routing config
    - { name: inbound_route_set,      description: "Bind a recipient URI pattern to a target app+route. Idempotent. Args: pattern (e.g. mailto:support+*@acme.com), target_app, target_route, priority?." }
    - { name: inbound_route_list,     description: "List configured inbound routes." }
    - { name: inbound_route_delete,   description: "Remove an inbound route. Args: id." }
    # templates
    - { name: template_create,        description: "Create a template. Args: name, channel (default 'email'), subject?, body_text?, body_html?, vars_schema?." }
    - { name: template_update,        description: "Update a template (partial). Args: id, fields…" }
    - { name: template_get,           description: "Fetch one template by id." }
    - { name: template_list,          description: "List templates. Args: channel?, limit?." }
    - { name: template_delete,        description: "Delete a template. Args: id." }
    # suppression
    - { name: suppression_list,       description: "List suppressed addresses. Args: channel?, limit?." }
    - { name: suppression_add,        description: "Suppress a recipient. Args: address (URI), reason." }
    - { name: suppression_remove,     description: "Remove an address from suppression. Args: address (URI)." }
    - { name: suppression_check,      description: "Single-row suppression lookup. Args: address, channel?. Returns {suppressed, reason?, source?, suppressed_at?}." }
    # senders (outbound identities — channel-agnostic list/get/delete; channel-specific onboarding)
    - { name: senders_list,           description: "List sending identities (verified emails, domains; later phones, push apps). Args: channel?, verified_only?. Returns [{address, kind, verified, dkim_status?}]." }
    - { name: senders_get,            description: "Get a single identity's status — verification, DKIM, feedback forwarding. Args: address (URI or bare)." }
    - { name: senders_delete,         description: "Remove a sending identity from the provider. Args: address." }
    - { name: senders_get_quota,      description: "Provider account stats — sandbox flag, 24h send quota, current usage. Powers the sandbox banner." }
    - { name: senders_create,         description: "Unified sender registration across email (SES) + SMS (Twilio). Address shape dispatches: \"foo@x.com\" → SES verify_email; \"x.com\" → verify_domain + DKIM/SPF DNS + (auto when aws-s3+aws-sns bound) full inbound bootstrap (S3 bucket + SNS topic + receipt rule + MX + webhook subscribe); \"+15551234567\" → adopt Twilio phone + (when inbound=auto/true) wire SmsUrl. Writes a row to the local senders table. Args: address (req), channel?, inbound? (auto|true|false), publish_dns?, spf?, region?, bucket_name?, topic_name?, rule_set_name?, rule_name?, display_name?, set_default?. Idempotent." }
    - { name: senders_refresh,        description: "Refresh verification/DKIM + sending status for locally-tracked senders by re-listing each bound provider. Does NOT import unknown upstream identities — use senders_create to add. Soft-deletes locals missing upstream. Returns {refreshed, count}." }
    - { name: senders_set_default,    description: "Flip the per-(project, channel) default sender. send_message uses the default when 'from' is omitted. Args: address, channel? (auto-detected if blank)." }
  ui_panels:
    - slot: project.page
      label: Messaging
      icon: mail
      entry: /ui/MessagingPanel.mjs

runtime:
  kind: source
  source:
    repo: github.com/apteva/apps
    ref: main
    entry: mcp/messaging
  port: 8080
  health_check: /health

db:
  driver: sqlite
  path: /data/messaging.db
  migrations: migrations/

config_schema:
  - name: ses_bounce_topic_arn
    type: text
    label: SES bounce/complaint SNS topic ARN
    description: Optional. SNS topic that publishes Delivery/Bounce/Complaint notifications for outbound mail. Subscribe it to /webhooks/ses-bounces.
  - name: ses_inbound_topic_arn
    type: text
    label: SES inbound SNS topic ARN
    description: Optional. SNS topic that publishes Received notifications for inbound mail. Subscribe it to /webhooks/ses-inbound.
  - name: ses_inbound_bucket
    type: text
    label: SES inbound S3 bucket
    description: Bucket name where SES stores raw .eml for inbound mail. Required if ses_inbound_topic_arn is set.
  - name: webhook_signing_secret
    type: text
    label: Webhook shared secret
    description: Optional shared secret for HMAC-validating SNS posts in addition to the standard SNS signature check.
  - name: twilio_auth_token
    type: text
    label: Twilio Auth Token (for inbound signature verification)
    description: Optional. When set, inbound webhooks at /webhooks/twilio-inbound have their X-Twilio-Signature verified using this token. Without it, inbound is accepted without signature check (relies on the URL being unguessable). Use only if PlatformClient.GetConnection can't expose the bound aws-twilio connection's auth_token in your deployment.

upgrade_policy: auto-patch
