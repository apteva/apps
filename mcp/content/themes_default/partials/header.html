{{ define "header" }}
<header class="site-header">
  <div class="container">
    <a class="site-title" href="/">{{ .SiteTitle }}</a>
    {{ if .SiteTagline }}<p class="site-tagline">{{ .SiteTagline }}</p>{{ end }}
    {{ if .PrimaryMenu }}
    <nav class="site-nav">
      <ul>
        {{ range .PrimaryMenu }}
        <li><a href="{{ .URL }}">{{ .Label }}</a></li>
        {{ end }}
      </ul>
    </nav>
    {{ end }}
  </div>
</header>
{{ end }}
