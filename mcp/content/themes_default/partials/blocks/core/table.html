{{- /* attrs: { header[], rows[][] } */ -}}
<table class="block-table">
  {{ if .Attrs.header }}
  <thead><tr>{{ range .Attrs.header }}<th>{{ . }}</th>{{ end }}</tr></thead>
  {{ end }}
  <tbody>
  {{ range .Attrs.rows }}
  <tr>{{ range . }}<td>{{ . }}</td>{{ end }}</tr>
  {{ end }}
  </tbody>
</table>
