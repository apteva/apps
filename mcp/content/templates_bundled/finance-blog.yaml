schema: apteva-content-template/v1
name: finance-blog
display_name: Finance Blog
version: 1.0.0
description: |
  Personal-finance blogger starter. Magazine-style homepage with hero +
  recent posts, three sample categories (Markets / Personal Finance /
  Crypto), an About page, a legally-required Disclosure page, and two
  sample posts demonstrating typical structure. Pairs cleanly with the
  default theme.
tags: [blog, finance, magazine]

requires_apps: []
optional_apps: []

settings:
  site_title: Finance Daily
  site_tagline: Smart money, plain language
  posts_per_page: "8"
  blog_root_path: /posts

terms:
  - kind: category
    name: Markets
    slug: markets
    description: Equities, ETFs, macro.
  - kind: category
    name: Personal Finance
    slug: personal-finance
    description: Budgeting, saving, retirement.
  - kind: category
    name: Crypto
    slug: crypto
    description: BTC, ETH, on-chain, regulation.
  - kind: tag
    name: stocks
  - kind: tag
    name: etfs
  - kind: tag
    name: retirement
  - kind: tag
    name: tax

pages:
  - slug: home
    title: Welcome
    blocks:
      - type: core/heading
        attrs:
          level: 1
          text: Smart money, plain language
      - type: core/paragraph
        attrs:
          text_md: "Markets, ETFs, and personal finance — without the jargon. New post every Tuesday."
      - type: core/cta
        attrs:
          heading: Subscribe
          body: One email a week. Unsubscribe anytime.
          button_label: Subscribe
          button_url: /subscribe
      - type: core/separator
        attrs:
          style: plain
      - type: core/heading
        attrs:
          level: 2
          text: Latest from the blog
      - type: core/paragraph
        attrs:
          text_md: "_Recent posts appear below — to surface them on this page, swap this block for an `analytics/chart` or a custom posts-list block in v1.1._"

  - slug: about
    title: About Finance Daily
    blocks:
      - type: core/heading
        attrs:
          level: 1
          text: About
      - type: core/paragraph
        attrs:
          text_md: Finance Daily is a one-person newsletter about personal finance and markets. Written for people who'd rather not read a Bloomberg terminal.
      - type: core/heading
        attrs:
          level: 2
          text: Who writes this
      - type: core/paragraph
        attrs:
          text_md: Replace this section with your bio — background, credentials, why people should listen to you.
      - type: core/heading
        attrs:
          level: 2
          text: Editorial principles
      - type: core/list
        attrs:
          style: bullet
          items:
            - Plain language over jargon.
            - Cite sources for every claim.
            - No affiliate links inside articles — disclosures at the bottom.
            - Update or correct posts when facts change — never silently.

  - slug: disclosure
    title: Disclosure
    blocks:
      - type: core/heading
        attrs:
          level: 1
          text: Disclosure
      - type: core/paragraph
        attrs:
          text_md: Nothing on this site is investment advice. The author may hold positions in securities discussed; specific holdings are listed below and updated quarterly.
      - type: core/heading
        attrs:
          level: 2
          text: Current holdings
      - type: core/paragraph
        attrs:
          text_md: _List your holdings here. Update on the first business day of each quarter._
      - type: core/heading
        attrs:
          level: 2
          text: Sponsorships
      - type: core/paragraph
        attrs:
          text_md: 'Sponsored posts are labelled "Sponsored" in the title. Newsletter ads appear above the fold and below the signature.'
      - type: core/heading
        attrs:
          level: 2
          text: Affiliate links
      - type: core/paragraph
        attrs:
          text_md: Some outbound links are affiliate links. Replace this paragraph with the specific programmes you participate in.

posts:
  - slug: welcome
    title: Welcome to Finance Daily
    excerpt: What this newsletter is about, and what you can expect.
    terms: [markets, personal-finance]
    blocks:
      - type: core/paragraph
        attrs:
          text_md: "If you're new here, welcome. Finance Daily covers three things: markets (what's moving and why), personal finance (how to think about your money), and crypto (the parts that matter)."
      - type: core/heading
        attrs:
          level: 2
          text: What you'll get
      - type: core/list
        attrs:
          style: bullet
          items:
            - A weekly post (~5 min read) every Tuesday.
            - A monthly portfolio review on the first Friday.
            - Occasional deeper dives when something big happens.
      - type: core/heading
        attrs:
          level: 2
          text: What you won't get
      - type: core/list
        attrs:
          style: bullet
          items:
            - Hot stock tips.
            - Crypto pump-and-dumps.
            - Hyperbolic headlines designed to make you click.
      - type: core/paragraph
        attrs:
          text_md: Subscribe below to get future posts in your inbox.

  - slug: etf-primer
    title: An ETF primer for total beginners
    excerpt: What an ETF is, how it differs from a mutual fund, and why most people should hold some.
    terms: [etfs, markets, personal-finance]
    blocks:
      - type: core/paragraph
        attrs:
          text_md: An ETF — exchange-traded fund — is a basket of securities (usually stocks or bonds) that you can buy or sell on a stock exchange the same way you'd buy or sell a single share.
      - type: core/heading
        attrs:
          level: 2
          text: Why does this matter
      - type: core/paragraph
        attrs:
          text_md: "Three reasons. **Diversification**: one purchase gets you exposure to hundreds of underlying companies. **Cost**: passive ETFs have annual fees of 0.03%–0.10%, vs 0.5%–1.5% for actively-managed mutual funds. **Liquidity**: you can sell whenever the market's open, vs end-of-day for mutual funds."
      - type: core/heading
        attrs:
          level: 2
          text: What to look for
      - type: core/list
        attrs:
          style: number
          items:
            - Low expense ratio (under 0.20% for broad-market funds).
            - High assets-under-management (over $1B usually means tight bid-ask spreads).
            - Tracks a broad index, not a niche theme.
      - type: core/paragraph
        attrs:
          text_md: "Next post: how to actually buy your first ETF in a tax-advantaged account."

menus:
  - slug: primary
    name: Primary
    items:
      - label: Markets
        target_kind: term
        target_slug: markets
      - label: Personal Finance
        target_kind: term
        target_slug: personal-finance
      - label: Crypto
        target_kind: term
        target_slug: crypto
      - label: About
        target_kind: page
        target_slug: about
      - label: Disclosure
        target_kind: page
        target_slug: disclosure

homepage_slug: home
