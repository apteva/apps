schema: apteva-app/v1

name: social
display_name: Social
version: 0.14.0
description: |
  Schedule and publish posts to your social media accounts: X (Twitter),
  Facebook Pages, Instagram Business, LinkedIn, TikTok, YouTube, Reddit,
  Pinterest, and Threads. Connect accounts from inside the app — no
  separate integration setup. Posts can be triggered from the panel or
  by an agent via MCP tools; jobs handle scheduling + retry.

author: Apteva
homepage: https://github.com/apteva/apps/tree/main/mcp/social
tags: [social-media, publishing, scheduling, productivity]

scopes: [project, global]
min_apteva_version: "0.10.0"

requires:
  permissions:
    - db.write.app
    - net.egress
    - platform.connections.execute
    - platform.connections.manage
    - platform.oauth.start
    - platform.apps.call
  # No required integrations — accounts are connected at runtime via
  # platform.oauth.start. Storage and jobs are bound by the operator at
  # install time so the app can persist media and schedule durable
  # publish jobs.
  integrations:
    - role: storage
      kind: app
      compatible_app_names: [storage]
      capabilities: [files.write]
      required: false
      label: "Storage (optional)"
      hint: "Persist uploaded media so posts can reference stable URLs across restarts."
    - role: jobs
      kind: app
      compatible_app_names: [jobs]
      capabilities: [jobs.schedule]
      required: false
      label: "Jobs (optional)"
      hint: "Without jobs, scheduled posts publish synchronously when the app's worker tick fires; with jobs, scheduling is durable + retried with exponential backoff."

provides:
  http_routes:
    - prefix: /
  mcp_tools:
    - { name: account_add,                 description: "Begin OAuth for a platform. Returns authorize_url + pending_account_id." }
    - { name: account_list_pending_pages,  description: "After OAuth completes, list selectable pages/channels (FB pages, IG business accounts, YouTube channels)." }
    - { name: account_finalize,            description: "Commit a pending account into the active account list. For multi-page platforms, supply page_id." }
    - { name: account_list,                description: "List connected social accounts in this project." }
    - { name: account_disconnect,          description: "Revoke a social account (deletes underlying connection too)." }
    - { name: post_create,                 description: "Create + publish (or schedule) a post across N social_account_ids. Args: body, social_account_ids[], schedule_at?, media_storage_ids?." }
    - { name: post_list,                   description: "List recent posts with per-target status. Args: limit?, status?." }
    - { name: post_retry,                  description: "Re-attempt failed targets on a post. Args: post_id." }
    - { name: inbox_list,                  description: "List inbox items (comments, DMs, mentions, reviews) across connected social accounts. Filters: kinds, status, social_account_ids, since, limit." }
    - { name: inbox_get,                   description: "Fetch one inbox item by id; with_thread=true returns the surrounding conversation." }
    - { name: inbox_mark_read,             description: "Mark one or more inbox items as read (local-only state)." }
    - { name: inbox_mark_unread,           description: "Mark one or more inbox items as unread (local-only state)." }
    - { name: inbox_archive,               description: "Archive one or more inbox items (hides from default list view)." }
    - { name: inbox_reply,                 description: "Reply to a comment or DM. Routes by kind. Returns the standard {status, reason?, error?, external_id?, permalink?} envelope." }
    - { name: inbox_private_reply,         description: "Instagram-only: reply to a comment by sending the author a DM." }
    - { name: inbox_hide,                  description: "Hide a comment on the platform side (Facebook, Instagram). Unsupported elsewhere." }
    - { name: inbox_unhide,                description: "Reverse inbox_hide." }
    - { name: inbox_like,                  description: "Like a comment on the platform side (Facebook, Instagram)." }
    - { name: inbox_delete,                description: "Delete a comment where the platform permits it." }
    - { name: inbox_sync,                  description: "Trigger an out-of-cycle inbox poll for one or more accounts (or all active accounts when omitted)." }
  ui_panels:
    - slot: project.page
      label: Social
      icon: megaphone
      entry: /ui/SocialPanel.mjs

runtime:
  kind: source
  source:
    repo: github.com/apteva/apps
    ref: main
    entry: mcp/social
  port: 8080
  health_check: /health

db:
  driver: sqlite
  path: /data/social.db
  migrations: migrations/

upgrade_policy: auto-patch
