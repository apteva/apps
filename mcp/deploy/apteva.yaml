schema: apteva-app/v1

name: deploy
display_name: Deploy
version: 0.4.2
description: |
  Local-first builds and runtime supervision for Apteva projects.
  Takes a code repo (from the Code app, a local path, or a git URL),
  builds it with the framework's toolchain, and runs the result as
  a supervised child process bound to a local port. The Apteva
  server proxies traffic to live deployments under /_deploy/<slug>/.

  v0.1 supports source kinds {code, local} and frameworks {go, node, static}.
  Future runtimes (Docker, SSH-to-VPS) plug in behind the same
  Runtime interface — no schema or surface changes required.

author: Apteva
homepage: https://github.com/apteva/apps/tree/main/mcp/deploy
icon: https://raw.githubusercontent.com/apteva/apps/main/mcp/deploy/icon.png
tags: [deploy, build, runtime, agent]

scopes: [project, global]
min_apteva_version: "0.10.0"

requires:
  permissions:
    - db.write.app
    - platform.apps.call
  integrations:
    - role: code
      kind: app
      required: true
      compatible_app_names: [code]
      label: Code app
      hint: Install the Code app to host repositories the Deploy app builds.
    - role: domains
      kind: app
      required: false
      compatible_app_names: [domains]
      label: Domains app
      hint: Install the Domains app to attach a custom domain to a deployment. Without it, the `domain` field on a deployment is free-text and no DNS is written.
    - role: certs
      kind: app
      required: false
      compatible_app_names: [certs]
      label: Certs app
      hint: Install the Certs app to auto-issue (and renew) Let's Encrypt certs when a domain is attached. Optional — the deploy/domain link works without it; you'll just have HTTP-only custom domains.
    - role: routes
      kind: app
      required: false
      compatible_app_names: [routes]
      label: Routes app
      hint: Install the Routes app to publish deployments at public hostnames via the platform's host router. attach_domain registers (fqdn → release-port); release rebuilds refresh it; detach removes it. Optional — without Routes, custom domains land DNS records but apteva-server doesn't proxy public traffic to the loopback port.

provides:
  http_routes:
    - prefix: /
  mcp_tools:
    - name: deploy_init
      description: Bind a source (code repo / local path / git URL) to a new deployment.
    - name: deploy_list
      description: List deployments in this project with current build/release status.
    - name: deploy_get
      description: Full detail for one deployment — last builds, current release, URL.
    - name: deploy_build
      description: Fetch source, run the framework build; returns a build_id.
    - name: deploy_release
      description: Promote a build to live (starts the supervised process, swaps the proxy route).
    - name: deploy_status
      description: Current build + release state, URL, last 10 builds.
    - name: deploy_logs
      description: Tail build logs (build_id) or runtime logs (release_id).
    - name: deploy_stop
      description: Stop the live release (process killed, port freed).
    - name: deploy_destroy
      description: Stop, drop deployment, delete builds and artifacts on disk.
    - name: deploy_attach_domain
      description: "Attach an FQDN to a deployment. Validates ownership against the Domains app and upserts a CNAME (or A) record pointing at this deployment's public host. Args: name (deployment) OR id, fqdn, target?, type? (CNAME|A, default CNAME), ttl?."
    - name: deploy_detach_domain
      description: "Clear a deployment's domain. Deletes the DNS record via the Domains app (if known) and clears the link. Args: name OR id."
    - name: deploy_list_routes
      description: "Server-side: live deployments as a route table {slug, port, domain, status} for the host-based proxy. Polled by apteva-server's host-router on a 5s tick — not intended for agent calls."
  ui_panels:
    - slot: project.page
      label: Deploy
      icon: rocket
      entry: /ui/DeployPanel.mjs

runtime:
  kind: source
  source:
    repo: github.com/apteva/apps
    ref: main
    entry: mcp/deploy
  port: 8080
  health_check: /health
  storage:
    - name: deploy
      mount_path: /data

db:
  driver: sqlite
  path: /data/deploy.db
  migrations: migrations/

config_schema:
  - name: port_range_start
    type: text
    default: "7100"
    label: Port range start
    description: First port the runtime supervisor may assign to a release. Defaults to 7100 to skip macOS AirPlay (5000) and AirPlay Receiver (7000), which silently coexist with 127.0.0.1-only binds and cause EADDRINUSE at process start.
  - name: port_range_end
    type: text
    default: "7999"
    label: Port range end
    description: Last port the runtime supervisor may assign to a release.
  - name: max_build_concurrency
    type: text
    default: "2"
    label: Max concurrent builds
    description: Hard cap on simultaneous build processes per host.
  - name: public_host
    type: text
    default: ""
    label: Public host
    description: Host this deploy is reachable at from the public internet (e.g. "edge.acme.com" or an IP). Used as the default CNAME/A target when attaching a domain. Leave empty if you'll pass `target` explicitly on each attach.

upgrade_policy: auto-patch
