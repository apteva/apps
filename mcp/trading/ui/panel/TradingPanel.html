<!DOCTYPE html>
<!--
  Trading panel for the Apteva dashboard's instance.tab slot.
  Loaded by apteva-server's app-proxy at:
    /api/apps/trading/ui/panel/TradingPanel.html?install_id=...&project_id=...

  Vanilla HTML+JS, same pattern as apps/mcp/crm. The fancy SPA lives
  separately at /api/apps/trading/ui/desk/dist/.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Trading · Panel</title>
  <link rel="stylesheet" href="TradingPanel.css" />
</head>
<body>
  <header class="panel-header">
    <h1>Trading</h1>
    <select id="portfolio-select" aria-label="Portfolio"></select>
    <span id="portfolio-status" class="status-pill"></span>
    <span id="data-pill" class="data-pill" title="Pricing provider per asset class"></span>
  </header>

  <section class="stats" id="stats" aria-label="Account stats"></section>

  <section class="block">
    <h2>Positions</h2>
    <table class="data-table" id="positions-table">
      <thead><tr>
        <th>Symbol</th><th>Qty</th><th>Mark</th><th>Mkt value</th>
        <th>Unrealized</th><th>Weight</th>
      </tr></thead>
      <tbody id="positions-body"></tbody>
    </table>
  </section>

  <section class="block">
    <h2>Recent orders</h2>
    <table class="data-table" id="orders-table">
      <thead><tr>
        <th>ID</th><th>Symbol</th><th>Side</th><th>Type</th>
        <th>Qty</th><th>Status</th>
      </tr></thead>
      <tbody id="orders-body"></tbody>
    </table>
  </section>

  <section class="block">
    <h2>Recent journal</h2>
    <ul class="journal" id="journal-body"></ul>
  </section>

  <footer class="panel-footer">
    <span id="updated-at"></span>
    <span class="grow"></span>
    <a href="../desk/dist/" target="_blank" rel="noopener">Open trading desk →</a>
  </footer>

  <script src="TradingPanel.js"></script>
</body>
</html>
