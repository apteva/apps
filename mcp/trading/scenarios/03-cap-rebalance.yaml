name: cap-rebalance
description: |
  Agent bootstraps a crypto portfolio, deliberately over-allocates
  to BTC, then audits and trims it back inside the 25% cap.
  Exercises the position-aware reasoning + cap-rebalance loop.

timeout: 180s
max_iterations: 14

setup:
  mode: autonomous
  app:
    path: ./
    config:
      tick_seconds: "2"
      bootstrap_demo: "false"
      pricing_provider: "mock"

directive: |
  Bootstrap a paper-trading book called "Crypto Momentum" —
  trend-following on top-cap crypto, max 25% per coin, allowed
  classes ["crypto"]. Then, deliberately for stress-testing,
  buy enough BTC to be over the 25% cap (a market buy of about
  60-70% of the book's cash). Wait for the fill.

  Now audit your position. Confirm BTC is over cap. Trim it
  back toward target with a market sell that brings you near
  (or below) 25%. Wait for the fill, then write a one-line
  thesis explaining the rebalance. Then stop.

assert:
  - tool_called: portfolio_create
  - tool_called: order_place
  - tool_called: positions_list | account_summary
  - http: GET /api/apps/trading/portfolios/1/orders?status=filled
    expect_status: 200
    expect_count_at: orders
    expect_count: 2
  - iterations_at_most: 14

budget:
  total_tokens: 120000
  cost_usd: 0.60
