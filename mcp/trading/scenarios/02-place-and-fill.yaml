name: place-and-fill
description: |
  Bootstrap → place a market order → journal a thesis. The engine
  ticks every 2 seconds in this scenario, so by the time the agent
  has issued its calls + the assert runs, the market order has
  filled. The agent does NOT have to wait or check — it just makes
  the calls and stops.

timeout: 180s
max_iterations: 10

setup:
  mode: autonomous
  app:
    path: ./
    config:
      tick_seconds: "2"
      bootstrap_demo: "false"
      pricing_provider: "mock"

directive: |
  Make exactly three tool calls in this order, then STOP. No reads,
  no checks, no "wait" — the engine fills market orders on its own
  cadence, you don't need to verify anything:

    1. portfolio_create   — name="Trend",
                            mandate="Long-only equity trend-following.",
                            allowed_classes=["equity","etf"]

    2. order_place        — portfolio_id (from step 1's response),
                            symbol="NVDA", side="buy", type="market", qty=5,
                            rationale="Starter NVDA — first leg of the trend book bootstrapping with a top-cap exposure."

    3. journal_write      — portfolio_id (from step 1),
                            kind="thesis",
                            body="Opened starter NVDA at MKT — first leg of the trend book."

  After call #3, stop. Do not re-read state. Do not call orders_list.

assert:
  - tool_called: portfolio_create
  - tool_called: order_place
  - tool_called: journal_write
  - http: GET /api/apps/trading/portfolios/1/orders?status=filled
    expect_status: 200
    expect_count_at: orders
    expect_count: 1
  - iterations_at_most: 10

budget:
  total_tokens: 30000
  cost_usd: 0.30
