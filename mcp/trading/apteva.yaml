schema: apteva-app/v1

name: trading
display_name: Trading
version: 0.4.9
description: |
  Trading desk for Apteva agents. Multi-portfolio, multi-asset (equity,
  etf, crypto, polymarket prediction markets). Each portfolio runs in
  one of two modes:

    paper — deterministic in-process execution engine; no broker, no
            real money. The default. Useful for strategy work and dry
            runs.
    live  — orders route through a per-portfolio broker. v0.3 ships
            with Binance (crypto) and Alpaca (equity/etf/crypto); each
            portfolio names its broker at creation via broker_slug.
            Bind a broker via Settings → Integrations to enable
            mode=live. Without any binding, every portfolio stays paper.

  Each portfolio has its own mandate, allowed asset classes, and
  daily-loss halt. Approval flow lives in the agent's directive (via
  channel-chat), not in this sidecar — keeps the trading surface
  focused on state, execution, market data, and audit log.

author: Apteva
homepage: https://github.com/apteva/apps/tree/main/mcp/trading
icon: https://raw.githubusercontent.com/apteva/apps/main/mcp/trading/icon.png
tags: [trading, finance, agent, polymarket, crypto]

scopes: [project, global]
min_apteva_version: "0.10.0"

requires:
  permissions:
    - db.write.app
    - platform.instances.read
    - net.egress                   # public market-data endpoints (Binance, Polymarket gamma-api)
    - platform.connections.execute # broker calls (live mode)
    - platform.connections.read    # discover bound brokers per slug — see brokers_list, brokerFor()
  integrations:
    # Optional. Bind one or more brokers to enable mode=live on new
    # portfolios. Each portfolio names its broker at creation via
    # broker_slug. Without any binding, every portfolio stays paper.
    #
    # Adding a new broker = drop a new adapter file in the sidecar
    # implementing brokerAdapter + a one-line addition to
    # compatible_slugs here.
    - role: broker
      kind: integration
      required: false
      compatible_slugs: [binance-trading, alpaca-trading, polymarket-clob]
      capabilities:
        - order.place
        - order.cancel
        - order.status
        - account.summary
        - positions.list
      tools:
        order.place:     create_order
        order.cancel:    cancel_order
        order.status:    get_order
        account.summary: get_account
        positions.list:  list_positions  # alpaca-only; binance returns holdings in get_account; polymarket-clob has no positions endpoint
      label: "Broker (optional — enables live trading)"
      hint: "Bind Binance (crypto), Alpaca (equity/etf/crypto), or Polymarket-CLOB (prediction markets). Portfolios pick a broker at creation."
    # Optional market-data integration. Required to trade equity/etf live
    # with real-time prices (pre-trade cash check + position MTM). Same
    # API key as alpaca-trading; bind both for a fully-live equity
    # workflow. Without it, equity marks fall back to mock walks — fine
    # for paper, NOT safe for live agents trading real money.
    - role: market_data_equity
      kind: integration
      required: false
      compatible_slugs: [alpaca-market-data, yahoo-finance]
      capabilities:
        - quotes.equity
      tools:
        quotes.equity: stock_snapshots
      label: "Market Data — Equity (optional — real prices for live equity portfolios)"
      hint: "Bind alpaca-market-data for paid-tier real-time. yahoo-finance works without auth as a free fallback — the trading sidecar already uses Yahoo automatically when nothing's bound here."

provides:
  http_routes:
    - prefix: /
  mcp_tools:
    - name: portfolio_create
      description: "Create a new paper or live portfolio. Live portfolios pass broker_slug — use brokers_list to enumerate."
    - name: brokers_list
      description: "Enumerate registered broker adapters and their currently-bound connections."
    - name: portfolio_list
      description: "List portfolios visible to this agent."
    - name: portfolio_get
      description: "Snapshot of one portfolio (mandate, equity, cash, status, watchlist)."
    - name: account_summary
      description: "Equity, cash, buying power, day and open P&L for one portfolio."
    - name: positions_list
      description: "Open positions for one portfolio."
    - name: orders_list
      description: "Working / filled / cancelled orders for one portfolio."
    - name: order_place
      description: "Place a paper order. Required rationale; subject to mandate + size cap + daily-loss halt."
    - name: order_cancel
      description: "Cancel a working order."
    - name: market_quote
      description: "Latest mark for a symbol — equity/crypto USD or polymarket YES/NO probabilities."
    - name: market_history
      description: "OHLCV bars or probability history for a symbol."
    - name: market_source
      description: "Report the live data source per asset class — provider name, errors_60s, staleness."
    - name: watchlist_add
      description: "Track a symbol on a portfolio."
    - name: watchlist_remove
      description: "Stop tracking a symbol."
    - name: alert_create
      description: "Create a price/probability/PNL alert that wakes the agent on match."
    - name: journal_write
      description: "Append a thesis/rationale/note to a portfolio's journal."
    - name: journal_read
      description: "Read journal entries for a portfolio (recent or filtered by kind)."
    - name: portfolio_pause
      description: "Pause this portfolio (no new orders). Self-only — resume is human-only via REST."
  # Same shape as crm + storage: a panel mounted in the dashboard's
  # project page slot. The rich desk SPA at /ui/desk/dist/ is also
  # served through the platform proxy at
  # /api/apps/trading/ui/desk/dist/index.html — operators can link to
  # it directly; the SDK doesn't yet ship a `ui_pages` slot to surface
  # iframe-mounted top-level nav entries from `kind: source` apps.
  # When that lands the desk gets a one-line declaration here.
  ui_panels:
    - slot: project.page
      label: Trading
      icon: trending-up
      entry: /ui/TradingPanel.mjs
  # No prompt_fragments. Trading policy (approval gates, position-sizing
  # opinions) belongs in the operator's per-instance directive, not
  # baked into every install. The MCP tool descriptions carry the
  # platform contract (rationale length, rejection codes, status
  # semantics); the agent learns the rest from structured rejections.

runtime:
  kind: source
  source:
    repo: github.com/apteva/apps
    ref: main
    entry: mcp/trading
  port: 8080
  health_check: /health

db:
  driver: sqlite
  path: /data/trading.db
  migrations: migrations/

config_schema:
  - name: starting_cash
    type: text
    default: "100000"
    label: Starting paper cash (USD)
    description: Issued to every new portfolio at creation.
  - name: daily_loss_halt_pct
    type: text
    default: "5"
    label: Daily-loss halt %
    description: Portfolio is auto-paused when day P&L drops below −X%.
  - name: tick_seconds
    type: text
    default: "5"
    label: Mark refresh cadence (seconds)
    description: How often the paper engine re-marks open positions and tries to fill working orders.
  - name: pricing_provider
    type: text
    default: "live"
    label: Pricing provider
    description: |
      live — Binance public REST for crypto + Polymarket gamma-api for prediction markets.
             Equity/etf use deterministic mock walks (no free no-auth feed worth depending on yet).
      mock — fully offline; deterministic walks for everything. Used by tests + air-gapped demos.
  - name: bootstrap_demo
    type: text
    default: "true"
    label: Auto-create a demo paper portfolio on first install
    description: |
      When true, on first boot of a project with zero portfolios, the app creates a "Demo Crypto"
      paper book with a starter watchlist + welcome journal entry. Set to "false" to keep the
      install empty (operator or agent creates everything by hand).
  - name: bootstrap_watchlist
    type: text
    default: "BTC-USD,ETH-USD,SOL-USD,POLY:btc-100k-2026"
    label: Bootstrap watchlist (comma-separated)
    description: Symbols added to the demo book's watchlist when bootstrap_demo is on.

upgrade_policy: auto-patch
