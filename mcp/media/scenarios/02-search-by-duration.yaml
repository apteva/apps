name: search-by-duration
description: |
  End-to-end probe pipeline. The runner pre-uploads a real 250ms
  WAV into storage; the media indexer (poll_interval_seconds: 1)
  picks it up; the agent calls media_search with a duration filter
  to find it. Validates the cross-app pipeline through the platform
  proxy + ffprobe + the duration-range query.

timeout: 90s
max_iterations: 6

setup:
  mode: autonomous
  app:
    path: ./
    config:
      poll_interval_seconds: "1"
  fixtures:
    - app: storage
      tool: files_upload
      file: ./fixtures/tone-250ms.wav
      args:
        folder: "/tests/"
        content_type: "audio/wav"

directive: |
  Find any indexed audio shorter than half a second using
  media_search with `has_audio: true` and `duration_max_ms: 500`.
  Report each result's file_id and duration_ms.

assert:
  # Source file landed where the fixture asked for it.
  - http: GET /api/apps/storage/files?folder=/tests/
    expect_status: 200
    expect_count_at: files
    expect_count: 1
  # Indexer generated + uploaded a waveform derivation into the
  # hidden /.media/waveform/ folder.
  - http: GET /api/apps/storage/files?folder=/.media/waveform/
    expect_status: 200
    expect_count_at: files
    expect_count: 1
  # Duration filter returns the indexed entry.
  - http: GET /api/apps/media/media?has_audio=true&duration_max_ms=500
    expect_status: 200
    expect_count_at: media
    expect_count: 1
  - tool_called: media_search
  - iterations_at_most: 6

budget:
  total_tokens: 12000
  cost_usd: 0.20
