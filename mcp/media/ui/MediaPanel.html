<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Media — Apteva</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark light;
        --bg: #0e0f12;
        --surface: #14151a;
        --border: #232730;
        --text: #d8dadf;
        --muted: #8a8f99;
        --accent: #f6a35a;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
      }
      header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 12px;
        padding: 16px;
      }
      .tile {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px;
      }
      .tile h3 {
        font-size: 13px;
        margin: 6px 0 2px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .meta { color: var(--muted); font-size: 11px; }
      img { max-width: 100%; height: auto; border-radius: 4px; }
      .empty { padding: 32px; text-align: center; color: var(--muted); }
    </style>
  </head>
  <body>
    <header>Media catalog</header>
    <div id="root" class="empty">Loading…</div>
    <script src="MediaPanel.js"></script>
  </body>
</html>
