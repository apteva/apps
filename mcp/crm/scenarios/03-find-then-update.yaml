name: find-then-update
description: |
  Agent first creates a contact, then receives a follow-up message
  about her and patches the job_title field. Exercises create + search
  + update flow in a single self-contained directive.

timeout: 60s
max_iterations: 8

setup:
  mode: autonomous
  app:
    path: ./

directive: |
  Two CRM tasks for Alice Cooper (alice@example.com):

  Step 1: add her to the CRM with job_title "Marketing Director".
  Step 2: update the job_title to "VP of Marketing" — she just got promoted.

  Then stop.

assert:
  - tool_called: contacts_create | contacts_upsert_by_channel
  - tool_called: contacts_update
  - http: GET /api/apps/crm/contacts
    expect_status: 200
    expect_count_at: contacts
    expect_count: 1
  - iterations_at_most: 8

budget:
  total_tokens: 12000
  cost_usd: 0.20
