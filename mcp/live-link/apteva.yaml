schema: apteva-app/v1

name: live-link
display_name: Live Link
version: 0.4.2
description: |
  Public HTTPS URL for a locally-installed Apteva instance. Two modes:

  - quick (default): Cloudflare Quick Tunnel. Anonymous, free, fresh
    *.trycloudflare.com URL on every start. Zero config — install the
    app, click "Go live", copy the URL.

  - named (v0.3): a stable URL on a Cloudflare zone you own (e.g.
    https://tunnel.example.com). Bind the cloudflare integration at
    install time (one API token), then pick a zone from the dropdown
    and a subdomain in the panel. The app calls the integration's
    cfd_tunnel + DNS tools through the platform proxy — your token
    never leaves the platform. Restarts reuse the same URL;
    expose_destroy reverses everything (CNAME + tunnel) on Cloudflare.

author: Apteva
homepage: https://github.com/apteva/apps/tree/main/mcp/live-link
icon: https://raw.githubusercontent.com/apteva/apps/main/mcp/live-link/icon.png
tags: [tunnel, expose, public-url, cloudflared, infrastructure, dev]

scopes: [global]
min_apteva_version: "0.10.0"

requires:
  permissions:
    - db.write.app
    - net.egress
    - platform.connections.execute            # cloudflare-named: call cfd_tunnel + DNS tools via integration runner
    - platform.connections.read_credentials   # ngrok: read the operator's authtoken to pass to the local agent (no REST tool available)
  integrations:
    # Cloudflare integration — used in named mode to list zones, manage
    # cfd_tunnels, and upsert/delete the CNAME. Optional at install
    # time so quick mode works without setup; named-mode start fails
    # with a clear error if the operator picks named without binding
    # this first.
    - role: cloudflare
      kind: integration
      compatible_slugs: [cloudflare]
      capabilities: [dns.write, tunnel.manage]
      tools:
        # Logical capability → upstream tool name mapping. Capability
        # strings are app-internal; the upstream names match what the
        # integration catalog declares.
        zones.list:               list_zones
        tunnels.list:             list_tunnels
        tunnels.create:           create_tunnel
        tunnels.token:            get_tunnel_token
        tunnels.update_config:    update_tunnel_configuration
        tunnels.delete:           delete_tunnel
        dns.list:                 list_dns_records
        dns.create:               create_dns_record
        dns.update:               update_dns_record
        dns.delete:               delete_dns_record
      required: false
      label: "Cloudflare (named mode)"
      hint: "Required for named mode (stable URL on your own domain). Quick mode works without this."
    # ngrok integration — alternative tunnel provider. Bind it and
    # live-link uses the ngrok agent instead of cloudflared. The
    # catalog's tools[] is empty (we drive the local ngrok binary
    # directly with the authtoken — no REST calls needed for v1) but
    # the binding gives us access to the authtoken via
    # PlatformAPI().GetConnectionCredentials.
    - role: ngrok
      kind: integration
      compatible_slugs: [ngrok]
      capabilities: []
      tools: {}
      required: false
      label: "ngrok (alternative provider)"
      hint: "Bind your ngrok authtoken to use ngrok instead of Cloudflare. Either one works; pick whichever you prefer per install. If both Cloudflare-named and ngrok are bound, Cloudflare-named wins."

provides:
  http_routes:
    - prefix: /
  mcp_tools:
    - name: expose_start
      description: Start a public tunnel and return its URL. Quick-mode URLs are fresh per start; named-mode URLs are stable.
    - name: expose_stop
      description: Stop the running tunnel, if any. Named tunnels persist on Cloudflare — use expose_destroy to remove them.
    - name: expose_status
      description: Report whether a tunnel is currently running, its public URL, and which mode is configured.
    - name: expose_destroy
      description: Tear down the named tunnel on Cloudflare (delete CNAME + tunnel). Refuses while running.
  ui_panels:
    - slot: project.page
      label: Live Link
      icon: globe
      entry: /ui/LiveLinkPanel.mjs
  workers: []

runtime:
  kind: source
  source:
    repo: github.com/apteva/apps
    ref: main
    entry: mcp/live-link
  port: 8080
  health_check: /health

db:
  driver: sqlite
  path: /data/live-link.db
  migrations: migrations/

config_schema:
  - name: provider
    type: select
    options: [cloudflared]
    default: cloudflared
    label: Tunnel provider
    description: Cloudflare is the only provider in v0.2; ngrok and tailscale-funnel arrive in v0.3.
  - name: target_url
    type: text
    default: ""
    label: Target URL (optional)
    description: |
      The local URL the tunnel should forward to. Leave empty to use
      APTEVA_GATEWAY_URL (the platform's own URL), which is the right
      answer for almost every install. Override only if you want to
      tunnel a different local service running on the same host.
  - name: cloudflared_path
    type: text
    default: ""
    label: cloudflared binary (override)
    description: |
      Optional path to a cloudflared binary you already manage. Leave empty
      to let the app handle it: it will look on $PATH first, fall back to a
      previously auto-installed copy in the install's data dir, and as a
      last resort download the latest release from github.com/cloudflare/cloudflared
      (~30MB, one-time, on the first "Go live" click).
  - name: ngrok_path
    type: text
    default: ""
    label: ngrok binary (override)
    description: |
      Optional path to an ngrok agent you already manage. Same fallback
      shape as cloudflared_path: $PATH → previously auto-installed copy
      → download the latest v3 stable from equinox.io (~20MB). Only
      relevant when the ngrok integration is bound.
  - name: ngrok_domain
    type: text
    default: ""
    label: ngrok reserved domain (paid plans)
    description: |
      Optional. Paid ngrok plans can reserve a hostname (e.g.
      yourname.ngrok.app) that survives agent restarts. Set this to
      pin the public URL across "Go live" cycles; leave empty to let
      ngrok assign a fresh random *.ngrok-free.app per start (free
      tier default).
  - name: auto_restart_on_boot
    type: toggle
    default: "true"
    label: Auto-restart on boot
    description: |
      If a tunnel was up when the sidecar last died (server reboot,
      crash, redeploy), bring it back automatically. Off if you want
      to manually start the tunnel after every restart.

upgrade_policy: auto-patch
