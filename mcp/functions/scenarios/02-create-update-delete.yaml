name: create-update-delete
description: |
  Agent creates a python function, disables it via functions_update,
  then deletes it — exercising the full lifecycle (create + update +
  delete) in a single session without any pre-seeded state.

timeout: 90s
max_iterations: 10

setup:
  mode: autonomous
  app:
    path: ./

directive: |
  Three steps using the functions app — call the tools by their exact
  names.

  Step 1: functions_create with these args:
    name:    "rollup"
    runtime: "python"
    source:  "import sys, json; print(json.dumps({'ok': True}))"

  Step 2: functions_update with:
    name:   "rollup"
    status: "disabled"

  Step 3: functions_delete with:
    name: "rollup"

  Then stop.

assert:
  - tool_called: functions_create
  - tool_called: functions_update
  - tool_called: functions_delete
  - http: GET /api/apps/functions/functions
    expect_status: 200
    expect_count_at: functions
    expect_count: 0
  - iterations_at_most: 10

budget:
  total_tokens: 16000
  cost_usd: 0.25
