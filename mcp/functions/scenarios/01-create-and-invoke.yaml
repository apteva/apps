name: create-and-invoke
description: |
  Agent creates a node function (which deploys v1) and invokes it
  once. Verifies the create + build + warm-invoke path end-to-end with
  a real LLM. The handler just echoes a field from its event, so the
  assertion can stay on observable side-effects.

timeout: 90s
max_iterations: 8

setup:
  mode: autonomous
  app:
    path: ./

directive: |
  Use the functions app — call the tools by their exact names; do not
  invent other tools.

  Step 1: functions_create with these args:
    name:    "hello-world"
    runtime: "node"
    source:  "export default async (event) => ({ hello: event?.name ?? 'world' });"

  Step 2: functions_invoke with:
    name:  "hello-world"
    event: { "name": "Apteva" }

  Then stop.

assert:
  - tool_called: functions_create
  - tool_called: functions_invoke
  - http: GET /api/apps/functions/functions
    expect_status: 200
    expect_count_at: functions
    expect_count: 1
  - iterations_at_most: 8

budget:
  total_tokens: 12000
  cost_usd: 0.20
