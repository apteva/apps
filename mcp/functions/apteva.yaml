schema: apteva-app/v1

name: functions
display_name: Functions
version: 1.0.0
description: |
  Lambda-style serverless functions. Each function is an immutable,
  built version served by a pool of warm worker processes; handlers
  export `default async (event, context) => result` and reach other
  Apteva apps via context.call. Auto-routed HTTP endpoint at
  /fn/<name>; pair with the Jobs app for cron-fired schedules.
author: Apteva
homepage: https://github.com/apteva/apps/tree/main/mcp/functions
icon: https://raw.githubusercontent.com/apteva/apps/main/mcp/functions/icon.svg
tags: [functions, faas, serverless, scripts, agent]

scopes: [project, global]
min_apteva_version: "0.10.0"

requires:
  permissions:
    - db.write.app
    - platform.apps.call

provides:
  http_routes:
    - prefix: /
  mcp_tools:
    - name: functions_create
      description: "Create a function and deploy v1. Args: name, runtime (node), source (inline handler) OR (repo_id+repo_path), package_json?, env?, timeout_ms?, max_memory_mb?."
    - name: functions_update
      description: "Update a function's metadata (env, timeout_ms, max_memory_mb, status). Source/runtime changes go through functions_deploy."
    - name: functions_delete
      description: "Delete a function and all its versions + invocation rows."
    - name: functions_list
      description: "List functions in the project. Optional filter by runtime, status."
    - name: functions_get
      description: "Fetch one function by id or name."
    - name: functions_invoke
      description: "Synchronously invoke a function's active version. Args: name (or id), event (any JSON). Returns {status, response, duration_ms, exit_code, invocation_id}."
    - name: functions_invocations
      description: "Recent invocations for a function. Args: id (or name), limit (default 50, max 200)."
    - name: functions_logs
      description: "Return value + console output of a single invocation. Args: invocation_id."
    - name: functions_deploy
      description: "Deploy a new immutable version and make it active. Args: id (or name), source OR (repo_id+repo_path), package_json?."
    - name: functions_rollback
      description: "Make an older, already-built version active again. Args: id (or name), version."
    - name: functions_versions
      description: "List a function's deploy history. Args: id (or name), limit."
  ui_panels:
    - slot: project.page
      label: Functions
      icon: code
      entry: /ui/FunctionsPanel.mjs

runtime:
  kind: source
  source:
    repo: github.com/apteva/apps
    ref: main
    entry: mcp/functions
  port: 8080
  health_check: /health

db:
  driver: sqlite
  path: /data/functions.db
  migrations: migrations/

upgrade_policy: auto-patch
