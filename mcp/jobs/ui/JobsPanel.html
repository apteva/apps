<!DOCTYPE html>
<!--
  Jobs panel.
  Loaded by apteva-server's app-proxy at:
    /api/apps/jobs/ui/JobsPanel.html?install_id=...&project_id=...&owner_app=...

  Same-origin with the dashboard, so /api/apps/jobs/* is reachable
  without extra plumbing. owner_app filter lets other apps embed this
  panel scoped to their own jobs (e.g. ?owner_app=crm).
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Jobs</title>
  <link rel="stylesheet" href="JobsPanel.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <header class="bar">
        <select id="status-filter">
          <option value="">All statuses</option>
          <option value="pending">Pending</option>
          <option value="running">Running</option>
          <option value="done">Done</option>
          <option value="failed">Failed</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <button id="refresh" title="Refresh">↻</button>
      </header>
      <ul id="list" class="job-list" aria-label="Jobs"></ul>
      <footer id="list-status" class="status-bar"></footer>
    </aside>
    <main id="detail" class="detail">
      <div class="empty-state">
        <p>Pick a job to see its runs.</p>
      </div>
    </main>
  </div>
  <script src="JobsPanel.js"></script>
</body>
</html>
