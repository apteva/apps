name: rotate-client-secret
description: |
  Routine hygiene — agent rotates a confidential client's secret.
  Verifies auth_clients_rotate_secret + that the agent surfaces the
  new secret in its response (which is the only chance to capture it).

timeout: 60s
max_iterations: 6

setup:
  mode: autonomous
  app:
    path: ./
    config:
      email_verification_required: "false"
      app_url: "http://localhost:8080"
  seed:
    - mcp: auth_clients_create
      args:
        name: backend-service
        type: web   # confidential client → has a secret
        redirect_uris: ["http://localhost:3000/callback"]
      capture: client.client_id

directive: |
  Our backend service "backend-service" (client_id {{ client.client_id }})
  was logged a 90-day-old client secret in a config file we just
  rotated. Rotate the auth client's secret now, capture the new
  value, and tell me what it is so I can update the service config.
  Then stop.

assert:
  - tool_called: auth_clients_rotate_secret
  # Agent's final reply should contain the new secret. Runner checks
  # the agent's last message text for a string starting with the
  # client_secret prefix shape we use (32-char base64url).
  - reply_contains_pattern: "[A-Za-z0-9_-]{40,}"
  - iterations_at_most: 6

budget:
  total_tokens: 8000
  cost_usd: 0.12
