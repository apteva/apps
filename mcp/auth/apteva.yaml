schema: apteva-app/v1

name: auth
display_name: Auth
version: 0.4.1
description: |
  Identity layer for Apteva-deployed SaaS, partitioned by Organization
  (row-level multi-tenancy a la Auth0/Clerk/Stytch B2B). One auth install
  owns N organizations; each org has its own users, OAuth clients,
  signing keys + JWKS, sessions, MFA factors, and audit log. Email +
  password signup/login, asymmetric (EdDSA) JWTs with per-org rotating
  keys, refresh-token rotation, email verification, password reset,
  magic links, TOTP MFA. Agents administer via MCP tools; the deployed
  SaaS frontend hits the HTTP routes (org derived from client_id, no
  URL changes from v0.3); the dashboard renders a consolidated AuthPanel
  with OrgSwitcher.

author: Apteva
homepage: https://github.com/apteva/apps/tree/main/mcp/auth
icon: https://raw.githubusercontent.com/apteva/apps/main/mcp/auth/icon.png
tags: [auth, identity, jwt, oauth, mfa, saas]

scopes: [project]
min_apteva_version: "0.10.0"

requires:
  permissions:
    - db.write.app
    - platform.instances.read
    - platform.apps.call    # call the messaging app to send transactional email
    - net.egress            # OAuth provider callbacks (google, github, apple)
  apps:
    - name: messaging
      optional: true
      reason: Sends verification, password-reset, magic-link, and invite emails. Without it, links are written to the audit log only — fine for development, not for production.

provides:
  http_routes:
    - prefix: /
  mcp_tools:
    # v0.4 surface — Organization-partitioned. Reads (search/list/stats/audit)
    # accept optional organization_id or organization_slug and roll up
    # project-wide when omitted. Mutations require an org. Tools that
    # operate by client_id derive the org from the client row.
    - name: auth_orgs_list
      description: List organizations in this project.
    - name: auth_orgs_create
      description: Create a new organization (auto-seeds an EdDSA keypair for its JWKS).
    - name: auth_orgs_update
      description: Rename / recolor / set policy_overrides on an organization.
    - name: auth_orgs_archive
      description: Archive an organization (soft-disable; cannot archive 'default').
    - name: auth_users_search
      description: Filtered user search. Org-scoped or project-wide rollup.
    - name: auth_users_get
      description: Snapshot of one user (requires org).
    - name: auth_users_get_context
      description: Snapshot + active sessions + MFA factors + last 20 audit events (requires org).
    - name: auth_users_disable
      description: Disable a user and revoke all sessions (requires org).
    - name: auth_users_enable
      description: Re-enable a disabled user (requires org).
    - name: auth_users_revoke_sessions
      description: Force-logout one user across all sessions (requires org).
    - name: auth_audit_search
      description: Time-window + event-type filter over the audit log. Org-scoped or project-wide.
    - name: auth_stats
      description: User counts + signups_7d + logins_24h. Org-scoped or project-wide rollup.
    - name: auth_clients_list
      description: List registered OAuth clients. Org-scoped or project-wide.
    - name: auth_clients_create
      description: Register a new OAuth client (requires org). Returns client_id + (for confidential clients) one-time client_secret.
    - name: auth_clients_rotate_secret
      description: Rotate a client's secret. Returns the new value once. Org is derived from the client row.
    - name: auth_clients_disable
      description: Disable a client. Existing access tokens remain valid until expiry; refresh tokens stop working. Org is derived from the client row.
  ui_panels:
    - slot: project.page
      label: Auth
      icon: key
      entry: /ui/AuthPanel.mjs

runtime:
  kind: source
  source:
    repo: github.com/apteva/apps
    ref: main
    entry: mcp/auth
  port: 8080
  health_check: /health

db:
  driver: sqlite
  path: /data/auth.db
  migrations: migrations/

config_schema:
  - name: app_url
    type: text
    label: Public app URL (override)
    description: Optional. Used in JWT issuer, email links, and OAuth redirects. Leave blank to auto-derive from the platform's public URL; set this only when this auth install fronts a custom domain different from apteva-server. e.g. https://app.example.com
  - name: from_email
    type: text
    label: Outbound from-address
    description: Optional. Sender address for transactional email (verify, reset, magic-link). Required only if the messaging app is installed; without it, links are written to the audit log instead. Must be a from-address verified in the messaging app.
  - name: jwt_access_ttl_seconds
    type: text
    default: "900"
    label: Access token TTL (seconds)
    description: Default 15 minutes. Per-client overrides supported.
  - name: jwt_refresh_ttl_days
    type: text
    default: "30"
    label: Refresh token TTL (days)
    description: Default 30. Per-client overrides supported.
  - name: password_min_length
    type: text
    default: "12"
    label: Password minimum length
    description: Minimum character count for new passwords.
  - name: password_classes_required
    type: text
    default: "2"
    label: Password classes required
    description: Of [lower, upper, digit, symbol], how many must appear. 0–4.
  - name: lockout_threshold
    type: text
    default: "5"
    label: Failed-login lockout threshold
    description: Consecutive failures before the account locks. 0 disables lockout.
  - name: lockout_initial_minutes
    type: text
    default: "15"
    label: Initial lockout duration (minutes)
    description: Doubles on each subsequent lockout while the failure streak persists.
  - name: email_verification_required
    type: text
    default: "true"
    label: Require verified email to log in
    description: When true, /login refuses unverified accounts. true | false.
  - name: magic_link_enabled
    type: text
    default: "true"
    label: Enable magic-link login
    description: Allows /magic-link/request — passwordless login by emailed token. true | false.

upgrade_policy: auto-patch
