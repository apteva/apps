name: set-and-clear
description: |
  Agent receives a directive to publish a status line, do some work,
  then clear it. Validates status_set + status_clear over a typical
  short-horizon workflow.

timeout: 60s
max_iterations: 8

setup:
  mode: autonomous
  app:
    path: ./

directive: |
  You are agent on instance 1. Before you start, set your status to
  "Reviewing the new feature spec" with tone "working" and emoji 📖.
  Then read it back with status_get to confirm, and finally clear it
  with status_clear. Stop after that.

assert:
  - tool_called: status_set
  - tool_called: status_get
  - tool_called: status_clear
  - http: GET /api/apps/status/instances/1
    expect_status: 204     # cleared → no row
  - iterations_at_most: 8

budget:
  total_tokens: 14000
  cost_usd: 0.10
