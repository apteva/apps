schema: apteva-app/v1

name: status
display_name: Status
version: 2.0.1
description: Per-agent status line. Agent writes "what I'm on right now" via MCP; dashboard reads it live. Short-horizon counterpart to the long-lived directive.
author: Apteva
homepage: https://github.com/apteva/apps/tree/main/mcp/status
icon: https://raw.githubusercontent.com/apteva/apps/main/mcp/status/icon.png
tags: [observability, agent, telemetry]

scopes: [project, global]
min_apteva_version: "0.10.0"

requires:
  permissions:
    - db.write.app
    - platform.instances.read

provides:
  http_routes:
    - prefix: /
  mcp_tools:
    - name: status_set
      description: Set the agent's status line at a phase transition — message, optional emoji, tone (info|working|warn|error|success|idle). See the /status skill for the cadence + tone protocol.
    - name: status_get
      description: Read the agent's current status line. Mainly for other agents/apps inspecting state.
    - name: status_clear
      description: Clear the status line. Prefer updating to a terminal tone (success/error/idle) so the operator sees what just happened.
  skills:
    - name: how-to-write-status
      command: /status
      body_file: skills/how-to-write-status.md
      description: |
        Teaches the agent the cadence (when to call status_set vs
        skip), tone semantics (info/working/warn/error/success/
        idle/blocked), and format (one short line per phase). Loads
        on any status_* tool call.
      metadata:
        category: observability
        icon: activity
  ui_panels:
    - slot: project.page
      label: Status
      icon: activity
      entry: /ui/StatusPanel.mjs

runtime:
  kind: source
  source:
    repo: github.com/apteva/apps
    ref: main
    entry: mcp/status
  image: ghcr.io/apteva/app-status:0.1.0
  port: 8080
  health_check: /health
  resources:
    cpu: 0.05
    memory: 64
    cpu_limit: 1
    memory_limit: 256
  storage:
    - name: data
      mount_path: /data
  env:
    APTEVA_GATEWAY_URL: { from: platform }
    APTEVA_APP_TOKEN:   { from: platform }
    APTEVA_INSTALL_ID:  { from: platform }
    APTEVA_PROJECT_ID:  { from: platform }
    APTEVA_APP_CONFIG:  { from: platform }

db:
  driver: sqlite
  path: /data/status.db
  migrations: migrations/

config_schema: []

upgrade_policy: auto-patch
