schema: apteva-app/v1

name: storage
display_name: Storage
version: 0.8.2
description: |
  File storage for Apteva agents and human teams. Upload bytes,
  organise into folders, share via signed URLs. Pluggable backend:
  local disk by default, S3-compatible (AWS / R2 / B2 / Wasabi /
  MinIO) when configured. On S3, presigned upload + download URLs
  let clients transfer bytes directly to/from the bucket — bytes
  never proxy through this container. Three visibility tiers:
  private (auth-only), signed (time-limited URL), public (open).
  Range requests, ETag, Cache-Control all set per file.

author: Apteva
homepage: https://github.com/apteva/apps/tree/main/mcp/storage
icon: https://raw.githubusercontent.com/apteva/apps/main/mcp/storage/icon.png
tags: [storage, files, cdn, upload]

scopes: [project, global]
min_apteva_version: "0.10.0"

requires:
  permissions:
    - db.write.app

provides:
  http_routes:
    - prefix: /
  # Folder is the only resource shape storage exposes. Glob matcher +
  # tree picker means the dashboard renders a folder tree; navigable
  # listing makes ancestor folders visible so an agent scoped to
  # "folder/invoices/**" can still see "invoices/" at root and drill
  # in. See app-sdk's FilterTree for the rules.
  resources:
    - name: folder
      label: Folder
      list_endpoint: /folders
      matcher: glob
      picker: tree
      listing_visibility: navigable
  permissions:
    - name: files.read
      resource: folder
      description: List + download files in matching folders.
    - name: files.write
      resource: folder
      description: Upload, move/rename, set tags + visibility on files in matching folders.
    - name: files.delete
      resource: folder
      description: Hard- or soft-delete files in matching folders.
  mcp_tools:
    # Tools where the folder is in the args get platform-side gating
    # (requires + resource_from). The SDK's MCP handler 403s before
    # the tool's handler runs.
    - name: files_upload
      description: Upload bytes from base64 + filename + folder. Returns the file id, signed URL, and sha256.
      requires: files.write
      resource_from: "folder/{arg.folder?}"
    - name: files_move
      description: Move a file to a different folder, optionally rename it.
      requires: files.write
      resource_from: "folder/{arg.folder?}"
    - name: files_from_url
      description: Fetch an external URL into storage in one call. Returns the new file's id.
      requires: files.write
      resource_from: "folder/{arg.folder?}"
    # Tools that operate on a file id don't know the folder until the
    # row is loaded, so they're handler-enforced (Caller().Allows in
    # the handler after the lookup). No requires here keeps the SDK's
    # gate out of the way.
    - name: files_get
      description: Fetch one file's metadata by id (no bytes).
    - name: files_get_url
      description: Mint a signed time-limited URL the agent can hand out for sharing.
    - name: files_set_tags
      description: Append or remove tags on a file.
    - name: files_set_visibility
      description: Flip visibility between private, signed, and public.
    - name: files_dedupe_check
      description: Look up an existing file by sha256 — the agent's "have I seen this already?" primitive.
    - name: files_delete
      description: Delete a file. Default is hard delete — row removed AND bytes removed from disk. Pass keep_record=true for soft-delete (audit history; bytes stay).
    # List/search tools filter their return values via FilterTree /
    # Filter — same handler-side enforcement, just at result time.
    - name: files_search
      description: Filtered file list — by name, tag, folder, content_type, sha256, size range.
    - name: files_list
      description: List files in one folder. Pass recursive=true to descend into sub-folders.
    - name: files_list_folders
      description: List immediate child folders one level under a parent folder.
  ui_panels:
    - slot: project.page
      label: Files
      icon: folder
      entry: /ui/StoragePanel.mjs
  ui_components:
    # Inline file tile the agent can attach to chat messages via
    # respond(components=[{app:"storage", name:"file-card", props:{file_id:N}}]).
    # Renders a thumbnail + name + size + Open link; live-updates on
    # storage events (file deleted, etc).
    - name: file-card
      entry: /ui/FileCard.mjs
      slots:
        - chat.message_attachment
      props_schema:
        type: object
        required: [file_id]
        properties:
          file_id:
            type: integer
      # Soft-convention preview prop: FileCard recognizes preview:true
      # and renders synthetic sample data instead of fetching, so the
      # dashboard's app-detail preview always shows a real-looking
      # tile — even on a brand-new install with zero files.
      preview_props:
        preview: true
  skills:
    # Foundational "how this app thinks" skill the agent loads
    # whenever it's working with storage at all. Folder conventions,
    # visibility tiers, dedup model, soft/hard delete defaults — the
    # things tool descriptions can't carry. body_file is parsed at
    # install time as canonical SKILL.md (frontmatter + body); the
    # frontmatter fields here are kept as a sanity-check / preview
    # for the dashboard.
    - name: how-to-use-storage
      command: /storage
      body_file: skills/how-to-use-storage.md
      description: |
        Storage's mental model + conventions. Load when working
        with files at all. Triggers on: "upload", "find a file",
        "share", "organise files", or any storage tool call.
      metadata:
        category: storage
        icon: 🗂️

runtime:
  kind: source
  source:
    repo: github.com/apteva/apps
    ref: main
    entry: mcp/storage
  port: 8080
  health_check: /health

db:
  driver: sqlite
  path: /data/storage.db
  migrations: migrations/

config_schema:
  - name: default_visibility
    type: select
    options: [private, signed, public]
    default: private
    label: Default visibility
    description: Visibility applied to new uploads when files_upload doesn't specify one. private = auth-only, signed = HMAC URL with expiry, public = open.
  - name: signed_url_default_ttl_seconds
    type: text
    default: "86400"
    label: Default signed URL TTL (seconds)
    description: How long signed URLs stay valid by default. Override per-call via files_get_url args.
  - name: max_upload_size_mb
    type: text
    default: "100"
    label: Max upload size (MB)
    description: Hard ceiling for files_upload + multipart uploads. v0.1 stores in memory before write — keep it modest.

  # Backend (new in v0.6) ─ leave at "disk" for the local filesystem
  # default. Switching to "s3" requires the s3_* fields below; boot
  # fails if any are missing.
  - name: backend
    type: select
    options: [disk, s3]
    default: disk
    label: Backend
    description: Where blob bytes live. "disk" = local filesystem (default). "s3" = any S3-compatible service (AWS S3, Cloudflare R2, Backblaze B2, Wasabi, MinIO, …). Switch only on a freshly-deployed install — existing blobs are not migrated automatically.
  - name: s3_endpoint
    type: text
    default: ""
    label: S3 endpoint
    description: Hostname of the S3 endpoint (no scheme). AWS = "s3.amazonaws.com" or region-specific "s3.<region>.amazonaws.com". R2 = "<account-id>.r2.cloudflarestorage.com". MinIO = "minio.example.com:9000". Required when backend=s3.
  - name: s3_region
    type: text
    default: "us-east-1"
    label: S3 region
    description: SigV4 signing region. AWS uses the bucket's region; R2 = "auto"; B2 = "us-east-005" (or your region); MinIO ignores it but a value is still required.
  - name: s3_bucket
    type: text
    default: ""
    label: S3 bucket
    description: Bucket name. Must exist before storage starts — we don't auto-create.
  - name: s3_access_key
    type: text
    default: ""
    label: S3 access key
    description: Access key ID. R2 = the API token's "Access Key ID"; B2 = "keyID"; AWS = IAM access key. Use a key scoped to this single bucket.
  - name: s3_secret_key
    type: password
    default: ""
    label: S3 secret key
    description: Paired secret. Stored in the install's encrypted config blob, never logged.
  - name: s3_use_ssl
    type: select
    options: ["true", "false"]
    default: "true"
    label: S3 over HTTPS
    description: Set false only for plain-HTTP MinIO in dev. Production must stay true.
  - name: s3_force_path_style
    type: select
    options: ["false", "true"]
    default: "false"
    label: Force path-style addressing
    description: AWS + R2 + B2 use virtual-host style ("bucket.endpoint/key") and want this false. MinIO and some custom Ceph deployments need true ("endpoint/bucket/key").

upgrade_policy: auto-patch
