schema: apteva-app/v1

name: routes
display_name: Routes
version: 0.3.1
description: |
  Hostname-based routing for Apteva. Owns the table mapping public
  hostnames (blog.example.com) to local backend targets
  (http://127.0.0.1:7100). Apps register routes via routes_register;
  apteva-server reads this table and reverse-proxies inbound traffic.

  Optional — uninstall this app and the platform keeps working;
  hostname routing simply stops, the server falls back to its
  existing path-based routing for everything.

  Works identically for cloud installs (browser → public IP →
  apteva-server) and tunnel installs (browser → cloudflared →
  apteva-server). The exposure mechanism doesn't matter — apteva-
  server is always the routing point.

author: Apteva
homepage: https://github.com/apteva/apps/tree/main/mcp/routes
icon: https://raw.githubusercontent.com/apteva/apps/main/mcp/routes/icon.png
tags: [routes, ingress, hostname, infrastructure, reverse-proxy]

scopes: [global]
min_apteva_version: "0.10.0"

requires:
  permissions:
    - db.write.app
  # v0.2 will add platform.events.subscribe for auto-orphan cleanup
  # when an install is uninstalled. v0.1 defers this — orphans show
  # in the panel; the user removes them by hand.

provides:
  http_routes:
    - prefix: /
  mcp_tools:
    - name: routes_register
      description: Register a hostname → target route. Idempotent on (hostname, target) from the same owner.
    - name: routes_unregister
      description: Remove a route by hostname. Caller must own it (errors if not).
    - name: routes_list
      description: List routes. Optional owner_install_id filter.
    - name: routes_get
      description: Fetch one route by hostname. Returns null when no route exists.
  ui_panels:
    - slot: project.page
      label: Routes
      icon: route
      entry: /ui/RoutesPanel.mjs

runtime:
  kind: source
  source:
    repo: github.com/apteva/apps
    ref: main
    entry: mcp/routes
  port: 8080
  health_check: /health

db:
  driver: sqlite
  path: /data/routes.db
  migrations: migrations/

config_schema:
  - name: routing_mode
    type: text
    default: "hostrouter"
    label: Routing mode
    description: "`hostrouter` (default) — apteva-server's built-in HostRouter reads the routes table and reverse-proxies. `proxy` — this app instead drives an external reverse proxy (Caddy / nginx): it detects the proxy, makes a one-time guarded edit so the proxy imports an app-owned include file, and keeps that file in sync with the routes table. Use `proxy` on hosts where Caddy/nginx already fronts :443."
  - name: proxy_kind
    type: text
    default: "auto"
    label: Proxy kind
    description: Which reverse proxy to drive in `proxy` mode — `auto` (detect Caddy then nginx), `caddy`, or `nginx`. Ignored in `hostrouter` mode.
  - name: proxy_config_path
    type: text
    default: ""
    label: Proxy main config path
    description: Override the path to the proxy's main config file. Empty = auto-locate (the proxy's systemd `--config`/`-c` flag, then standard locations incl. Homebrew paths on macOS). Set this when auto-detection misses — e.g. a non-standard install.
  - name: proxy_reload_command
    type: text
    default: ""
    label: Proxy reload command
    description: Override the command used to gracefully reload the proxy after a config change. Empty = per-kind default (`caddy reload --config <main>` / `nginx -s reload`). Set this if your proxy needs e.g. `systemctl reload caddy` or an admin-API call. The routes sidecar must be able to run it.
  - name: cert_dir
    type: text
    default: "/var/lib/apteva/certs"
    label: Cert directory
    description: Filesystem path where the certs app writes PEM files (its `cert_output_dir`). In `proxy` mode the proxy's TLS is pointed at `<cert_dir>/<cert_fqdn>/fullchain.pem` + `privkey.pem`. Default `/var/lib/apteva/certs` matches the certs app's default, so the chain works out of the box. Set empty for no explicit TLS lines (Caddy then uses its own automatic HTTPS; nginx routes stay HTTP-only). For local macOS testing, point it at the same writable path you gave certs.

upgrade_policy: auto-patch
