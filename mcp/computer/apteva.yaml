schema: apteva-app/v1

name: computer
display_name: Computer
version: 0.3.2
description: |
  Watch and steer the agent's browser. Operator panel for browsing
  the sessions this sidecar owns; inline chat components the agent
  attaches so its work surfaces visually instead of as plain text.

  v0.3 adds the first MCP tools — browser_open / browser_list /
  browser_screenshot / browser_close — so callers (first the
  `screenshots` app, then later the agent loop itself) can drive
  browser sessions through this app instead of through the core
  binary. Sessions are owned by this sidecar; attaching to a
  session the agent already opened in core is not yet supported
  (cloud-backed resume + local CDP attach land in later releases).

  v0.3.1 exposes browser_list + a /sessions HTTP route (proxied as
  /api/apps/computer/sessions) so the operator panel and other UIs
  can render the live session set without round-tripping through
  apteva-server. v0.3.2 corrects the route prefix (the v0.3.1 panel
  fetched the wrong URL and 404'd).

author: Apteva
homepage: https://github.com/apteva/apps/tree/main/mcp/computer
tags: [browser, observability, ui]

scopes: [project, global]
min_apteva_version: "0.10.0"

requires:
  permissions:
    - net.egress           # Browserbase / Steel API calls

provides:
  http_routes:
    - prefix: /

  mcp_tools:
    - name: browser_open
      description: |
        Open a new browser session. Args: backend? (local|browserbase|steel,
        default reads APTEVA_BROWSER_BACKEND env then falls back to "local"),
        url? (navigate after open), viewport? ({width:int, height:int},
        default 1600x800). Returns {session_id, backend, current_url,
        width, height}. The session is owned by this app and persists
        until browser_close or the 30-minute idle reaper, whichever
        comes first.
    - name: browser_list
      description: |
        List sessions currently owned by this sidecar. Returns
        {sessions:[{session_id, backend, current_url, debug_url,
        opened_at, last_used_at}]}. Empty when the sidecar holds none.
        Operators reach the same data via GET /sessions on the
        sidecar (the dashboard hits /api/apps/computer/sessions).
    - name: browser_screenshot
      description: |
        Capture a PNG of the session's current viewport. Args: session_id.
        Returns {png_b64, current_url, width, height}. Full-page capture
        and SoM overlay are not yet supported — the computer/ package
        exposes only a single Screenshot() that returns the current
        viewport bytes.
    - name: browser_close
      description: |
        Close a session opened by this app. Args: session_id. Idempotent —
        closing an unknown id returns {closed:false}. Always returns
        without error so callers can safely close-on-defer.

  ui_panels:
    - slot: project.page
      label: Browsers
      icon: monitor
      entry: /ui/ComputerPanel.mjs

  ui_components:
    # Inline browser-session card — agent attaches after a successful
    # browser_session(open). Carries enough context (backend, URL,
    # status) to identify the session at a glance + a deep-link to
    # the operator panel for live watching.
    - name: browser-card
      entry: /ui/BrowserCard.mjs
      slots: [chat.message_attachment]
      props_schema:
        type: object
        required: [instance_id, backend, url]
        properties:
          instance_id: { type: string }
          backend:     { type: string, enum: [local, browserbase, steel] }
          url:         { type: string }
          status:      { type: string }
      preview_props:
        preview: true
        instance_id: "demo-instance"
        backend: "local"
        url: "https://example.com"
        status: "active"

    # Annotated screenshot — agent attaches after computer_use(screenshot)
    # when SoM is on. Renders the image with SoM badges as an SVG
    # overlay so the operator sees what the agent sees AND what it's
    # about to act on.
    - name: screenshot-with-som
      entry: /ui/ScreenshotCard.mjs
      slots: [chat.message_attachment]
      props_schema:
        type: object
        required: [screenshot_url]
        properties:
          screenshot_url: { type: string }
          som:
            type: array
            items:
              type: object
              properties:
                label: { type: integer }
                x:     { type: number }
                y:     { type: number }
                w:     { type: number }
                h:     { type: number }
                kind:  { type: string }
          caption: { type: string }
      preview_props:
        preview: true

    # Live screencast — defaults to a polled thumbnail (cheap on
    # long transcripts), upgrades to full CDP screencast canvas when
    # the operator clicks expand or the agent passes mode:"live".
    - name: live-view
      entry: /ui/LiveCard.mjs
      slots: [chat.message_attachment]
      props_schema:
        type: object
        required: [instance_id]
        properties:
          instance_id: { type: string }
          height:      { type: integer, default: 360 }
          mode:
            type: string
            enum: [thumb, live]
            default: thumb
      preview_props:
        preview: true
        instance_id: "demo-instance"

    # Multi-step browse summary — horizontal strip of recently visited
    # pages with thumbnails and titles. Saves the agent from listing
    # eight URLs in prose.
    - name: navigation-timeline
      entry: /ui/TimelineCard.mjs
      slots: [chat.message_attachment]
      props_schema:
        type: object
        required: [steps]
        properties:
          steps:
            type: array
            items:
              type: object
              properties:
                url:       { type: string }
                title:     { type: string }
                thumbnail: { type: string }
                ts:        { type: string }
      preview_props:
        preview: true

  skills:
    - name: how-to-use-computer
      command: /computer
      body_file: skills/how-to-use-computer.md
      description: |
        Teaches the agent which chat component to attach for which
        browser action. Loads on browser_session and computer_use
        tool calls. Render-only attachments — for human-in-the-loop
        questions, use the existing pace() + console-injection
        pattern instead.
      metadata:
        category: browsing
        icon: 🖥️

runtime:
  kind: source
  source:
    repo: github.com/apteva/apps
    ref: main
    entry: mcp/computer
  port: 8080
  health_check: /health

upgrade_policy: auto-patch
