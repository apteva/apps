schema: apteva-app/v1

name: fleet
display_name: Fleet
version: 0.5.1
description: |
  Control plane for a fleet of client apteva instances. Spawns every
  tenant as a local apteva process on the parent host with admin-
  driven setup: fleet mints a setup token and returns it via
  tenant_create; the operator finishes admin registration in the
  browser; tenant_attach_key completes the link.

  v0.3 adds optional domain orchestration (Domains + Certs + Routes
  integrations) so each tenant can be reached at a public hostname
  via the parent's reverse proxy, plus auto-respawn for tenants that
  don't survive a parent restart, plus per-tenant apteva version
  management via tenant_update.

  Each tenant is a fully independent apteva install: own DB, own
  users, own dashboard. The parent goes away → tenants are auto-
  restarted; the box reboots → reconcileOnBoot re-adopts surviving
  tenants and respawns dead ones.

author: Apteva
homepage: https://github.com/apteva/apps/tree/main/mcp/fleet
icon: https://raw.githubusercontent.com/apteva/apps/main/mcp/fleet/icon.png
tags: [fleet, tenants, multi-instance, control-plane, ops]

scopes: [project, global]
min_apteva_version: "0.10.0"

requires:
  permissions:
    - db.write.app
    - net.egress
    - platform.apps.call
  integrations:
    - role: domains
      kind: app
      required: false
      compatible_app_names: [domains]
      label: Domains app
      hint: Install the Domains app to attach custom hostnames to tenants.
    - role: certs
      kind: app
      required: false
      compatible_app_names: [certs]
      label: Certs app
      hint: Install the Certs app to auto-issue Let's Encrypt certs on attach.
    - role: routes
      kind: app
      required: false
      compatible_app_names: [routes]
      label: Routes app
      hint: Install the Routes app (in proxy mode) to publish tenants at public hostnames via the parent's reverse proxy.

provides:
  http_routes:
    - prefix: /
  mcp_tools:
    # Descriptions are double-quoted because YAML disallows ": "
    # inside unquoted scalars — every "Args: …" suffix would trip the
    # parser otherwise (see fleet/v0.2.0's install bug).
    - name: tenant_create
      description: "Spawn a new local apteva instance. Allocates a data dir + port, mints a setup token, runs the apteva CLI, returns setup_url + setup_token (or admin credentials when the auto-setup orchestrator succeeds). v0.4 default pins new tenants to npm apteva@latest, installed into ~/.apteva-fleet/versions/<v>/ once and re-used across tenants. Override via apteva_version (latest, host, or specific semver) or apteva_bin (literal path). Args: slug, owner_email, apteva_version? (default: latest), apteva_bin?."
    - name: tenant_attach_key
      description: "Finish admin-driven setup by attaching the tenant's api_key (created via the tenant dashboard after admin registration). Flips status to active. Args: tenant_id, api_key."
    - name: tenant_connect
      description: "Register an existing apteva-server (local or remote) as a tenant without spawning it. Args: base_url, api_key, owner_email, slug?."
    - name: tenant_list
      description: "List managed tenants."
    - name: tenant_get
      description: "Full record for one tenant + recent events. Args: tenant_id."
    - name: tenant_start
      description: "Start a stopped local tenant. Args: tenant_id."
    - name: tenant_stop
      description: "Stop a running local tenant (process SIGTERM → SIGKILL). Registry only for remote-connected tenants. Args: tenant_id."
    - name: tenant_delete
      description: "Stop and remove a tenant. For local tenants also wipes the data dir (only with confirm=true). Args: tenant_id, confirm? (required for data wipe)."
    - name: tenant_support_login
      description: "Mint a short-lived super-admin URL on the tenant. Args: tenant_id, reason."
    - name: tenant_run_remote
      description: "Proxy an MCP tool call to a tenant's gateway using its api_key. Args: tenant_id, app, tool, input."
    - name: tenant_attach_domain
      description: "Attach a public hostname to a tenant. Orchestrates Domains (DNS record) → Certs (Let's Encrypt DNS-01) → Routes (register fqdn → tenant apteva-server port on the parent's routes table). Idempotent; partial-failure tolerant. Args: tenant_id, fqdn, target?, type?, ttl?."
    - name: tenant_detach_domain
      description: "Clear a tenant's domain link — DNS delete, cert revoke, route unregister, local clear. Local clear runs even on remote failure. Args: tenant_id."
    - name: tenant_update
      description: "Per-tenant apteva version update. Installs the requested version into a fleet-owned npm prefix at ~/.apteva-fleet/versions/<v>/, records target_version, stops the running tenant, respawns with the new binary. Other tenants are unaffected. Local-only. Args: tenant_id, version? (empty → npm latest)."
    - name: tenant_check_updates
      description: "Read-only: return npm's apteva@latest plus every local tenant whose current_version is behind. Args: (none)."
    - name: tenant_set_target_version
      description: "Pin a tenant's desired apteva version without applying — the panel surfaces drift between current and target. Args: tenant_id, version (empty to clear)."
    - name: tenant_reveal_api_key
      description: "Return the tenant's api_key. Fleet keeps the key sealed (AES-GCM); this tool unseals + returns. Sensitive — records an api_key_revealed event on the tenant. Args: tenant_id."
    - name: tenant_reset_admin_password
      description: "Rotate the tenant admin user's password to a fresh random value via PATCH /api/users/<id>/password (auth'd with the stored api_key). Revokes every existing session for that user. Returns admin_email + admin_password. Use when the operator needs admin credentials again — fleet does not persist the original password. Args: tenant_id."
  ui_panels:
    - slot: project.page
      label: Fleet
      icon: server
      entry: /ui/FleetPanel.mjs

db:
  driver: sqlite
  path: /data/fleet.db
  migrations: migrations/

runtime:
  kind: source
  source:
    repo: github.com/apteva/apps
    ref: main
    entry: mcp/fleet
  image: ghcr.io/apteva/fleet:0.1.0
  port: 8080
  health_check: /health
  resources:
    cpu: 0.05
    memory: 64
    cpu_limit: 1

upgrade_policy: auto-patch
